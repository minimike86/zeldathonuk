<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldathonUK</title>
    <!-- No-flash theme preload: apply the last resolved theme's CSS vars
         BEFORE React paints, so the page loads in the correct colours / bg /
         logo first time instead of flashing the baked-in bloodmoon defaults
         and then swapping. ThemeProvider refreshes this cache after each
         fetch (see THEME_CSS_KEY). Falls back silently to the CSS defaults
         on a first-ever visit or in private mode. -->
    <script>
      (function () {
        try {
          var css = localStorage.getItem('zeldathon-theme-css');
          if (css) {
            var s = document.createElement('style');
            s.setAttribute('data-theme-preload', '');
            s.textContent = css;
            document.head.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
