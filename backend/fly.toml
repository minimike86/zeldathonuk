# Fly.io configuration for the Django backend.
# Run `fly launch --no-deploy` first to claim an app name, then edit this file.

app = "zeldathonuk-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"
  build-target = "prod"

[env]
  PORT = "8000"
  DJANGO_DEBUG = "0"
  DJANGO_ALLOWED_HOSTS = "zeldathonuk-api.fly.dev"
  # CORS_ALLOWED_ORIGINS, DATABASE_URL, DJANGO_SECRET_KEY, CLERK_* and the
  # third-party API tokens belong in `fly secrets set ...` — never in this file.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
